version: "1.1.0"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: course-tracker-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001/api
    depends_on:
      - backend
    networks:
      - course-tracker-network
    command: npm run dev -- --host 0.0.0.0

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: course-tracker-backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
    networks:
      - course-tracker-network
    command: npm run dev

networks:
  course-tracker-network:
    driver: bridge
